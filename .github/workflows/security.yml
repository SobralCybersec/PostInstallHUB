# ============================================================
# PostInstallHUB — Security
# Runs on every push / PR + weekly Monday 04:00 Lisbon.
# Jobs:
#   gitleaks          — secret / credential scanning
#   shellcheck-strict — error-level linting (no SC suppression)
#   url-audit         — no plaintext http:// in scripts
#   dangerous-patterns— rm -rf /, chmod 777, eval injection …
#   license-check     — MIT license present
# ============================================================
name: Security

on:
  push:
    branches: ["**"]
  pull_request:
  schedule:
    - cron: "0 3 * * 1"
      timezone: "Europe/Lisbon"

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  # ── 1. Secret scanning ───────────────────────────────────
  gitleaks:
    name: Secret scan (Gitleaks v8)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.3.1
        with:
          fetch-depth: 0   # full history — gitleaks needs git log

      - name: Install Gitleaks v8.27.2
        run: |
          curl -sSL \
            https://github.com/gitleaks/gitleaks/releases/download/v8.27.2/gitleaks_8.27.2_linux_x64.tar.gz \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Detect secrets
        run: |
          gitleaks detect \
            --source . \
            --redact \
            --verbose \
            --no-git=false

  # ── 2. ShellCheck strict (error level) ───────────────────
  shellcheck-strict:
    name: ShellCheck (error severity)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.3.1

      - name: ShellCheck — errors only (hard block)
        run: |
          find . -name '*.sh' -not -path './.git/*' -print0 \
            | xargs -0 shellcheck \
                --severity=error \
                --format=gcc \
                --shell=bash

  # ── 3. HTTPS-only URL audit ──────────────────────────────
  url-audit:
    name: HTTPS-only URLs
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.3.1

      - name: No plaintext http:// URLs
        run: |
          violations=$(
            grep -rn 'http://' scripts/ lib/ install.sh 2>/dev/null \
              | grep -v '#.*http://' \
              | grep -v 'localhost\|127\.0\.0\.1\|0\.0\.0\.0' \
            || true
          )
          if [[ -n "$violations" ]]; then
            echo "$violations"
            echo "::error::Plaintext http:// URLs detected — all external URLs must use https://"
            exit 1
          fi
          echo "All external URLs use HTTPS ✓"

  # ── 4. Dangerous pattern detection ───────────────────────
  dangerous-patterns:
    name: Dangerous pattern audit
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.3.1

      - name: Audit dangerous shell patterns
        run: |
          hard_errors=0
          warnings=0

          check() {
            local level="$1" label="$2" pattern="$3"
            local hits
            hits=$(grep -rEn "$pattern" scripts/ lib/ install.sh 2>/dev/null || true)
            if [[ -n "$hits" ]]; then
              echo "── $label ──"
              echo "$hits"
              if [[ "$level" == "error" ]]; then
                echo "::error::${label}"
                hard_errors=$(( hard_errors + 1 ))
              else
                echo "::warning::${label}"
                warnings=$(( warnings + 1 ))
              fi
              echo ""
            fi
          }

          # Hard errors — will block merge
          check error \
            "rm -rf / (catastrophic delete path)" \
            'rm\s+-[a-zA-Z]*r[a-zA-Z]*f\s+/'

          check error \
            "chmod 777 / chmod a+rwx (world-writable)" \
            'chmod\s+(777|a\+rwx)'

          check error \
            "Unquoted variable passed to rm" \
            'rm\s+-[a-zA-Z]+\s+\$[A-Za-z_][A-Za-z_0-9]*\b[^"]'

          # Warnings — informational, logged to summary
          check warning \
            "eval with command substitution (injection risk)" \
            'eval\s+["\x27]?\$\('

          check warning \
            "curl piped directly to shell (no checksum)" \
            'curl[^|]+\|\s*(sudo\s+)?(ba)?sh'

          check warning \
            "wget piped directly to shell (no checksum)" \
            'wget[^|]+\|\s*(sudo\s+)?(ba)?sh'

          {
            echo "## Dangerous Pattern Audit"
            echo "- Hard errors: **${hard_errors}**"
            echo "- Warnings: **${warnings}**"
          } >> "$GITHUB_STEP_SUMMARY"

          if (( hard_errors > 0 )); then
            echo "Audit failed: ${hard_errors} hard error(s) found"
            exit 1
          fi
          echo "Dangerous pattern audit passed (${warnings} warning(s)) ✓"

  # ── 5. License check ─────────────────────────────────────
  license-check:
    name: MIT license present
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.3.1

      - name: LICENSE.md exists and references MIT
        run: |
          if [[ ! -f LICENSE.md ]]; then
            echo "::error::LICENSE.md not found"
            exit 1
          fi
          if ! grep -qi 'MIT' LICENSE.md; then
            echo "::error::LICENSE.md does not reference MIT License"
            exit 1
          fi
          echo "License check passed ✓"
